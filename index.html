<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Line Follower Vision Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        /* Top display for the command */
        #command-display {
            background-color: #2c3e50;
            color: #2ecc71;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            min-height: 50px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        video, canvas {
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            background-color: #000;
        }
        .controls {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 300px;
        }
        button {
            padding: 12px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover {
            background-color: #2980b9;
        }
        input[type=range] {
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="command-display">WAITING FOR CAMERA...</div>

    <div class="container">
        <video id="webcam" width="320" height="240" autoplay playsinline style="display: none;"></video>
        
        <canvas id="outputCanvas" width="320" height="240"></canvas>

        <div class="controls">
            <button id="startBtn">Start Camera</button>
            
            <div>
                <label for="thresholdSlider"><strong>Darkness Threshold: <span id="thresholdValue">100</span></strong></label>
                <br>
                <small>Slide left if room is dark, right if bright</small>
                <input type="range" id="thresholdSlider" min="0" max="255" value="100">
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const commandDisplay = document.getElementById('command-display');
        const startBtn = document.getElementById('startBtn');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdValueDisplay = document.getElementById('thresholdValue');

        let isProcessing = false;
        const MIN_PIXELS_FOR_LINE = 20; // Minimum dark pixels needed to confirm a line exists

        // Update threshold display when slider moves
        thresholdSlider.addEventListener('input', (e) => {
            thresholdValueDisplay.innerText = e.target.value;
        });

        // Start Webcam
        startBtn.addEventListener('click', async () => {
            try {
                // 'facingMode: "environment"' attempts to use the back camera on mobile devices
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                isProcessing = true;
                startBtn.style.display = 'none'; // Hide button once started
                requestAnimationFrame(processFrame);
            } catch (err) {
                alert("Camera access denied or not available! Please check your browser permissions.");
                console.error(err);
            }
        });

        // Process Video Feed Frame by Frame
        function processFrame() {
            if (!isProcessing) return;

            // Draw current video frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Get current threshold from the slider
            const DARK_THRESHOLD = parseInt(thresholdSlider.value);

            // Scan a thicker block near the bottom of the screen (20 pixels high)
            const scanHeight = 20;
            const scanY = canvas.height - 60; 
            const imageData = ctx.getImageData(0, scanY, canvas.width, scanHeight);
            const pixels = imageData.data;

            let totalX = 0;
            let blackPixelCount = 0;

            // Loop through every pixel in our scanned block
            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i + 1];
                const b = pixels[i + 2];
                
                // Calculate grayscale value
                const gray = (r + g + b) / 3;

                // If the pixel is dark enough to be part of the line
                if (gray < DARK_THRESHOLD) {
                    const pixelIndex = (i / 4);
                    const x = pixelIndex % canvas.width; // Get the X coordinate of this pixel
                    
                    totalX += x;
                    blackPixelCount++;
                }
            }

            // Draw scanning zone for visual debugging
            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 2;
            ctx.strokeRect(0, scanY, canvas.width, scanHeight);

            let command = "";

            // Determine action based on found pixels (Center of Mass logic)
            if (blackPixelCount > MIN_PIXELS_FOR_LINE) {
                // Calculate the true center of the line
                const averageX = totalX / blackPixelCount;

                // Draw a blue dot at the detected center of the line
                ctx.fillStyle = "blue";
                ctx.fillRect(averageX - 5, scanY + (scanHeight / 2) - 5, 10, 10);

                // Turn logic based on screen thirds
                const leftThreshold = canvas.width / 3;
                const rightThreshold = (canvas.width / 3) * 2;

                // Draw boundary lines to see the "thirds"
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.beginPath();
                ctx.moveTo(leftThreshold, 0);
                ctx.lineTo(leftThreshold, canvas.height);
                ctx.moveTo(rightThreshold, 0);
                ctx.lineTo(rightThreshold, canvas.height);
                ctx.stroke();

                if (averageX < leftThreshold) {
                    command = "TURN LEFT ⬅️";
                    commandDisplay.style.color = "#e74c3c"; // Red
                } else if (averageX > rightThreshold) {
                    command = "TURN RIGHT ➡️";
                    commandDisplay.style.color = "#3498db"; // Blue
                } else {
                    command = "STRAIGHT ⬆️";
                    commandDisplay.style.color = "#2ecc71"; // Green
                }
            } else {
                // Fail-safe if no line is found
                command = "STOP - NO LINE 🛑";
                commandDisplay.style.color = "#95a5a6"; // Gray
            }

            // Update top display text
            commandDisplay.innerText = command;

            // Loop the function for the next frame
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
