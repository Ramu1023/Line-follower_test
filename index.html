<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Follower Vision Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        /* Top display for the command */
        #command-display {
            background-color: #2c3e50;
            color: #2ecc71;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        video, canvas {
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            background-color: #000;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div id="command-display">WAITING FOR CAMERA...</div>

    <div class="container">
        <video id="webcam" width="320" height="240" autoplay playsinline style="display: none;"></video>
        
        <canvas id="outputCanvas" width="320" height="240"></canvas>

        <button id="startBtn">Start Camera</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const commandDisplay = document.getElementById('command-display');
        const startBtn = document.getElementById('startBtn');

        let isProcessing = false;

        // Start Webcam
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                isProcessing = true;
                startBtn.style.display = 'none';
                requestAnimationFrame(processFrame);
            } catch (err) {
                alert("Camera access denied or not available!");
                console.error(err);
            }
        });

        // Process Video Feed Frame by Frame
        function processFrame() {
            if (!isProcessing) return;

            // Draw current video frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // We only need to check the bottom area of the frame to see where the line is
            const scanY = canvas.height - 40; // 40 pixels from the bottom
            const imageData = ctx.getImageData(0, scanY, canvas.width, 1);
            const pixels = imageData.data;

            let darkestValue = 255;
            let darkestX = canvas.width / 2; // Default to center

            // Loop through pixels in that row to find the darkest spot (the line)
            for (let x = 0; x < canvas.width; x++) {
                // Get grayscale value of pixel
                const r = pixels[(x * 4)];
                const g = pixels[(x * 4) + 1];
                const b = pixels[(x * 4) + 2];
                const gray = (r + g + b) / 3;

                if (gray < darkestValue) {
                    darkestValue = gray;
                    darkestX = x;
                }
            }

            // Draw a red targeting line on the canvas for visual debugging
            ctx.fillStyle = "red";
            ctx.fillRect(0, scanY, canvas.width, 2);
            ctx.fillStyle = "blue";
            ctx.fillRect(darkestX - 5, scanY - 5, 10, 10); // Mark the line position

            // Determine command based on X coordinate of the line
            let command = "";
            const leftThreshold = canvas.width / 3;
            const rightThreshold = (canvas.width / 3) * 2;

            if (darkestX < leftThreshold) {
                command = "TURN LEFT ⬅️";
                commandDisplay.style.color = "#e74c3c"; // Red
            } else if (darkestX > rightThreshold) {
                command = "TURN RIGHT ➡️";
                commandDisplay.style.color = "#3498db"; // Blue
            } else {
                command = "STRAIGHT ⬆️";
                commandDisplay.style.color = "#2ecc71"; // Green
            }

            // Update top display
            commandDisplay.innerText = command;

            // Loop the function
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
